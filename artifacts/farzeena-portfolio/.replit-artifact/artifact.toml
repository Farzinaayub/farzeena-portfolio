kind = "web"
previewPath = "/"
title = "Farzeena Portfolio"
version = "1.0.0"
id = "artifacts/farzeena-portfolio"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20562
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/farzeena-portfolio run dev"

[services.env]
PORT = "20562"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/farzeena-portfolio", "run", "build"]
publicDir = "artifacts/farzeena-portfolio/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
